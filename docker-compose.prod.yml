version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: filmdb-postgres
    restart: unless-stopped
    env_file:
      - docker.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/sonle1501/film-db-backend:latest
    container_name: filmdb-backend
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    env_file:
      - docker.env
    depends_on:
      db:
        condition: service_healthy
      warp:
        condition: service_started
    environment:
      - JAVA_TOOL_OPTIONS=-Dhttp.proxyHost=warp -Dhttp.proxyPort=1080 -Dhttps.proxyHost=warp -Dhttps.proxyPort=1080 -Dhttp.nonProxyHosts="localhost|127.0.0.1|db|frontend|backend"
    volumes:
      - ./dataset:/app/dataset
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: ghcr.io/sonle1501/film-db-frontend:latest
    container_name: filmdb-frontend
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    env_file:
      - docker.env
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: filmdb-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy

  ngrok:
    image: ngrok/ngrok:latest
    container_name: filmdb-ngrok
    restart: unless-stopped
    command:
      - "http"
      - "nginx:80"
      - "--log=stdout"
    env_file:
      - docker.env
    ports:
      - "4040:4040"
    depends_on:
      nginx:
        condition: service_started

  warp:
    image: caomingjun/warp:latest
    container_name: filmdb-warp
    restart: unless-stopped
    ports:
      - "127.0.0.1:1080:1080"
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1

  watchtower:
    image: containrrr/watchtower:latest
    container_name: filmdb-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup --label-enable

volumes:
  pgdata:
    driver: local
