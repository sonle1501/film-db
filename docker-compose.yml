version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: filmdb-postgres
    restart: unless-stopped
    env_file:
      - docker.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: filmdb-backend
    restart: unless-stopped
    env_file:
      - docker.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./dataset:/app/dataset
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./apps/frontend/film-db-ui
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        - INTERNAL_API_URL=${INTERNAL_API_URL:-http://backend:8080}
    container_name: filmdb-frontend
    restart: unless-stopped
    env_file:
      - docker.env
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: filmdb-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy

  ngrok:
    image: ngrok/ngrok:latest
    container_name: filmdb-ngrok
    restart: unless-stopped
    command:
      - "http"
      - "nginx:80"
      - "--log=stdout"
    env_file:
      - docker.env
    ports:
      - "4040:4040"
    depends_on:
      nginx:
        condition: service_started

volumes:
  pgdata:
    driver: local
