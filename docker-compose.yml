version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: filmdb-postgres
    restart: unless-stopped
    env_file:
      - docker.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: filmdb-backend
    restart: unless-stopped
    env_file:
      - docker.env
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./dataset:/app/dataset
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./apps/frontend/film-db-ui
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        - INTERNAL_API_URL=${INTERNAL_API_URL:-http://backend:8080}
    container_name: filmdb-frontend
    restart: unless-stopped
    env_file:
      - docker.env
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
